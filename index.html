<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Viola</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="top">
    <img src="/viola-logo-Picsart-BackgroundRemover.jpg" class="logo" alt="Viola Logo">
    <h1>VIOLA</h1>
</div>

<div class="bottom">
    <input id="url" type="text" placeholder="*ENTER URL HERE*">
    <button onclick="go()">Search</button>
</div>

<script>

const input = document.getElementById("url");

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        go();
    }
});

function go() {

    let query = input.value.trim();

    if (!query) return;

    let url;

    if (query.includes(".") || query.startsWith("http")) {

        if (!query.startsWith("http")) {
            query = "https://" + query;
        }

        url = query;

    } else {

        url = "https://www.google.com/search?q=" + encodeURIComponent(query);

    }

    const encoded = btoa(url);

    window.location.href = "/api/browser/" + encoded;

}

</script>

</body>
</html>
